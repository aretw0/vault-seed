name: Publish dgk-lab-runtime

on:
  push:
    tags:
      - 'dgk-lab-runtime@*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish dgk-lab-runtime to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    environment:
      name: pypi
      url: https://pypi.org/project/dgk-lab-runtime/

    permissions:
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.12'

      - name: Install build tools
        run: pip install hatch

      - name: Build
        working-directory: packages/lab-runtime
        run: hatch build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@76f52bc884231f62b9a034ebfe128415e6c4ee7b # v1.12.4
        with:
          packages-dir: packages/lab-runtime/dist/
