name: Security Audit

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/security-audit.yml"
      - ".github/actions/setup/action.yml"
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Audit production dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup

      - name: Security gate (high/critical, prod)
        run: pnpm audit --audit-level=high --prod

      - name: Audit moderado — prod (informacional)
        if: always()
        run: pnpm audit --audit-level=moderate --prod
        continue-on-error: true

      - name: Full audit report
        if: always()
        run: pnpm audit --json > audit-full.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pnpm-audit-full-report
          path: audit-full.json
          retention-days: 30
