name: "Publish Release"

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'aretw0/vault-seed' && contains(github.event.head_commit.message, 'chore(release):')

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate release tree
        run: npm run validate

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push Git tag
        id: create_tag
        run: |
          set -euo pipefail
          version="v$(cat VERSION)"
          echo "version_tag=$version" >> "$GITHUB_OUTPUT"

          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "::notice::Tag $version already exists locally."
          else
            git tag -a "$version" -m "Release $version"
          fi

          if git ls-remote --exit-code --tags origin "$version" >/dev/null 2>&1; then
            echo "::notice::Tag $version already exists on origin."
          else
            git push origin "$version"
          fi

      - name: Get release notes from CHANGELOG
        id: get_release_notes
        run: |
          set -euo pipefail
          version_number="${{ steps.create_tag.outputs.version_tag }}"
          version_number="${version_number#v}"
          release_notes="$(node scripts/get_release_notes.js "$version_number")"

          if [ -z "$release_notes" ]; then
            echo "::error::Could not extract release notes for version ${version_number} from CHANGELOG.md."
            exit 1
          fi

          {
            echo "release_notes<<EOF"
            echo "$release_notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create_tag.outputs.version_tag }}
          name: ${{ steps.create_tag.outputs.version_tag }}
          body: ${{ steps.get_release_notes.outputs.release_notes }}
          prerelease: false
