name: "Publish Release"

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.repository == 'aretw0/vault-seed' && (github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'chore(release):'))
    outputs:
      version_tag: ${{ steps.create_tag.outputs.version_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          install-playwright: "true"

      - name: Validate release tree
        run: pnpm run validate

      - name: Configure Git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push Git tag
        id: create_tag
        run: |
          set -euo pipefail
          version="v$(node -p "require('./package.json').version")"
          echo "version_tag=$version" >> "$GITHUB_OUTPUT"

          if git rev-parse "$version" >/dev/null 2>&1; then
            echo "::notice::Tag $version already exists locally."
          else
            git tag -a "$version" -m "Release $version"
          fi

          if git ls-remote --exit-code --tags origin "$version" >/dev/null 2>&1; then
            echo "::notice::Tag $version already exists on origin."
          else
            git push origin "$version"
          fi

      - name: Get release notes from CHANGELOG
        id: get_release_notes
        run: |
          set -euo pipefail
          version_number="${{ steps.create_tag.outputs.version_tag }}"
          version_number="${version_number#v}"
          release_notes="$(node scripts/get_release_notes.js "$version_number")"

          if [ -z "$release_notes" ]; then
            echo "::error::Could not extract release notes for version ${version_number} from CHANGELOG.md."
            exit 1
          fi

          {
            echo "release_notes<<EOF"
            echo "$release_notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.create_tag.outputs.version_tag }}
          name: ${{ steps.create_tag.outputs.version_tag }}
          body: ${{ steps.get_release_notes.outputs.release_notes }}
          prerelease: false

  publish-packages:
    name: Publish npm packages
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: create-release
    if: github.repository == 'aretw0/vault-seed' && (github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, 'chore(release):'))
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js with npm auth
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Setup
        uses: ./.github/actions/setup
        with:
          cache-mode: "off"

      - name: Preflight — verify NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it at: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Build publishable packages
        run: pnpm --filter @aretw0/dgk-astro-plugins build

      - name: Publish
        run: pnpm changeset publish -- --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
