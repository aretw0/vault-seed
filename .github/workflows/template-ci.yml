name: Template CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-template:
    name: Validate template
    if: github.repository == 'aretw0/vault-seed'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.11"

      - name: Install Playwright browser
        run: pnpm exec playwright install chromium

      - name: Validate markdown and onboarding
        run: pnpm run validate

      - name: Smoke responsive site and Lab
        run: pnpm run site:responsive
        env:
          VAULT_RESPONSIVE_REQUIRE_EXTERNAL: "1"

      - name: Test CLI package
        run: pnpm --filter @aretw0/dgk-cli test

      - name: Check for unwanted Copilot .gitattributes entry
        run: |
          set -euo pipefail
          if grep -qF ".obsidian/plugins/copilot/data.json filter=copilot-secrets diff=copilot-secrets" .gitattributes; then
            echo "::error file=.gitattributes::Found unwanted Copilot configuration in .gitattributes. This entry should not be committed to the template repository."
            exit 1
          fi

          echo "No unwanted Copilot configuration found in .gitattributes."

      - name: Check for unwanted plugin folders
        run: |
          set -euo pipefail
          if [ -d ".obsidian/plugins" ] && find .obsidian/plugins/ -mindepth 1 -maxdepth 1 -type d | grep -q .; then
            echo "::error file=.obsidian/plugins/::Found unwanted plugin folders in .obsidian/plugins/. Plugin folders should not be committed to the template repository."
            exit 1
          fi

          echo "No unwanted plugin folders found in .obsidian/plugins/."
