name: Validate MDT Diagrams

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "docs/diagrams/.templates/**"
      - ".templates/**"
      - "mdt.toml"
      - "99 - Meta e Anexos/99.3 - Referência/Visualização do Fluxo do Vault.md"
      - "99 - Meta e Anexos/99.1 - Onboarding/Entendendo a Estrutura de Pastas.md"
      - "99 - Meta e Anexos/99.3 - Referência/Comandos do dgk.md"
      - ".github/workflows/validate-mdt.yml"
  push:
    branches: [main]
    paths:
      - "docs/diagrams/.templates/**"
      - ".templates/**"
      - "mdt.toml"
      - "99 - Meta e Anexos/99.3 - Referência/Comandos do dgk.md"
  workflow_dispatch:
  schedule:
    - cron: "0 14 * * 3"

permissions:
  contents: read

jobs:
  validate:
    name: Check MDT diagram sync
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Cache mdt_cli
        id: cache-mdt
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cargo/bin/mdt
          key: ${{ runner.os }}-mdt-cli-0.7.0

      - name: Install mdt_cli
        if: steps.cache-mdt.outputs.cache-hit != 'true'
        run: cargo install mdt_cli --locked --version 0.7.0

      - name: Check MDT sync — vault diagrams
        run: mdt check
