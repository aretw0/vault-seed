name: Publish CLI

on:
  push:
    tags:
      - '@aretw0/dgk-cli@*'
      - '@aretw0/dgk-astro-plugins@*'
      - '@aretw0/dgk-skills@*'
      - '@aretw0/dgk-runner@*'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @aretw0/dgk-cli to npm
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js with npm auth
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Setup
        uses: ./.github/actions/setup
        with:
          cache-mode: "off"

      - name: Preflight — verify NPM_TOKEN
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::NPM_TOKEN secret is not set. Add it at: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi

      - name: Publish
        run: pnpm changeset publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
