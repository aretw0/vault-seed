name: Vault CI (User)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  action-pins:
    name: GitHub Action Pins
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate third-party action pins
        run: node scripts/check_github_action_pins.mjs

  test-python:
    name: Python tests
    needs: [action-pins]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install uv
        run: curl -fsSL https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run Python test suites
        run: |
          uv run python packages/cli/vendor/quality/test_avaliar_textos.py -v
          uv run python packages/cli/vendor/quality/test_text_scorer.py -v
          uv run python scripts/test_llm_client.py -v
          uv run python packages/cli/vendor/quality/test_avaliar_apresentacoes.py -v

  mdt-check:
    name: MDT template drift (advisory)
    needs: [action-pins]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable

      - name: Install mdt_cli
        run: cargo install mdt_cli --locked --version 0.7.0

      - name: Check MDT template sync
        run: mdt check
        # report-only: drift detectado não bloqueia merge

  validate:
    name: Validate vault
    needs: [action-pins]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup
        uses: ./.github/actions/setup
        with:
          install-playwright: "true"

      - name: Install uv
        run: curl -fsSL https://astral.sh/uv/install.sh | sh && echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate vault quality gates
        run: pnpm run validate
