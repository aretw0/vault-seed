name: Vault CI (User)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  action-pins:
    name: GitHub Action Pins
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Validate third-party action pins
        run: node scripts/check_github_action_pins.mjs

  validate:
    name: Validate vault
    needs: [action-pins]
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint main vault
        run: pnpm run lint:main

      - name: Lint templates
        run: pnpm run lint:templates

      - name: Run script tests
        run: pnpm run test

      - name: Validate onboarding
        run: pnpm run validate:onboarding

      - name: Smoke template safety
        run: pnpm run smoke:template
