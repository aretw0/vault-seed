name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "00 - Entrada/**"
      - "10 - Diário/**"
      - "20 - Projetos/**"
      - "30 - Áreas/**"
      - "40 - Recursos/**"
      - "50 - Arquivo/**"
      - "90 - Modelos/**"
      - "99 - Meta e Anexos/**"
      - ".site/**"
      - "astro.config.mjs"
      - "packages/astro-plugins/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Detect site URL and base path
        id: pages-url
        run: |
          CNAME=$(gh api "repos/${{ github.repository }}/pages" --jq '.cname // ""' 2>/dev/null || echo "")
          if [ -n "$CNAME" ]; then
            echo "site=https://$CNAME" >> "$GITHUB_OUTPUT"
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "site=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_OUTPUT"
            echo "base=/${{ github.event.repository.name }}" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build @dgk/astro-plugins
        run: pnpm --filter @dgk/astro-plugins build

      - name: Build site
        run: pnpm run site:build
        env:
          ASTRO_SITE: ${{ steps.pages-url.outputs.site }}
          ASTRO_BASE: ${{ steps.pages-url.outputs.base }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VAULT_TITLE: ${{ vars.VAULT_TITLE }}

      - name: Check site
        run: pnpm run site:check
        env:
          ASTRO_BASE: ${{ steps.pages-url.outputs.base }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
