name: Deploy Site

on:
  push:
    branches: [main]
    paths:
      - "00 - Entrada/**"
      - "10 - Diário/**"
      - "20 - Projetos/**"
      - "30 - Áreas/**"
      - "40 - Recursos/**"
      - "50 - Arquivo/**"
      - "90 - Modelos/**"
      - "99 - Meta e Anexos/**"
      - ".site/**"
      - "astro.config.mjs"
      - "packages/astro-plugins/**"
      - ".github/workflows/deploy-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Astro site
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build @dgk/astro-plugins
        run: pnpm --filter @dgk/astro-plugins build

      - name: Build site
        run: pnpm run site:build
        env:
          ASTRO_SITE: https://${{ github.repository_owner }}.github.io
          ASTRO_BASE: /${{ github.event.repository.name }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VAULT_TITLE: ${{ vars.VAULT_TITLE }}

      - name: Check site
        run: pnpm run site:check
        env:
          ASTRO_BASE: /${{ github.event.repository.name }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: dist/

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
