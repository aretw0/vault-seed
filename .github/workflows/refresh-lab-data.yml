name: Refresh Lab Data

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v4.0.0
        with:
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@bd01503ad93569bc31b533f7f8bfadecf9e10a8a # v6.3.1
        with:
          version: "0.11.11"

      - name: Run ETL
        run: pnpm run notebooks:etl

      - name: Run AI feed curation
        if: ${{ env.ANTHROPIC_API_KEY != '' }}
        run: uv run --with anthropic --with defusedxml python scripts/curate_feeds_ia.py
        continue-on-error: true

      # .dgk/ é ignorado pelo git — snapshots são efêmeros e regenerados pelo CI a cada deploy.
      # Este workflow serve para acionar o ETL + curadoria IA manualmente ou via schedule,
      # mas não persiste nenhum arquivo no repositório.
