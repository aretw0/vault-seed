name: Setup Node and pnpm
description: Install the pinned pnpm version and project dependencies.

inputs:
  cache-mode:
    description: Dependency cache trust mode. Use "off" for privileged publish/deploy jobs.
    required: false
    default: "auto"
  install-playwright:
    description: Install Playwright Chromium with browser cache.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        run_install: false

    - name: Setup Node.js
      if: ${{ inputs.cache-mode != 'off' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ".nvmrc"
        cache: "pnpm"

    - name: Setup Node.js without dependency cache
      if: ${{ inputs.cache-mode == 'off' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: ".nvmrc"

    - name: Validate lockfile
      shell: bash
      run: |
        set -euo pipefail
        if [ ! -f pnpm-lock.yaml ]; then
          echo "::error::pnpm-lock.yaml is required for deterministic CI."
          exit 1
        fi

    - name: Install dependencies
      shell: bash
      run: |
        set -euo pipefail
        pnpm install --frozen-lockfile

    - name: Cache Playwright browsers
      if: ${{ inputs.install-playwright == 'true' }}
      id: playwright-cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-chromium-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

    - name: Install Playwright browsers
      if: ${{ inputs.install-playwright == 'true' && steps.playwright-cache.outputs.cache-hit != 'true' }}
      shell: bash
      run: pnpm exec playwright install chromium --with-deps
